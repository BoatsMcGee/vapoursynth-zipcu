name: Build

on:
  push:
    branches:
      - main

  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

  workflow_dispatch: {}

jobs:
  build-sdist:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Export version
        id: version
        run: |
          version=$(grep -oP '\.version\s*=\s*"\K[^"]+' build.zig.zon)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist --outdir dist

      - uses: actions/upload-artifact@v7
        with:
          name: vapoursynth-vszipcu-sdist
          path: dist/*.tar.gz

  check-tag:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build-sdist
    outputs:
      exists: ${{ steps.check-tag.outputs.exists }}
    steps:
      - uses: mukunku/tag-exists-action@v1.7.0
        id: check-tag
        with:
          tag: ${{ needs.build-sdist.outputs.version }}

  # CUDA x86_64 Linux/Windows only. Building needs toolkit headers + link stubs
  # (cuda.h, libcuda.so stub / cuda.lib). NVRTC is runtime-loaded from the
  # nvidia-cuda-nvrtc PyPI dependency — nothing CUDA is vendored into the wheel.
  #
  # Two CUDA major versions: 13 (default, existing) and 12 (CUDA 12.9.2, +cu12 suffix).
  build-wheel:
    if: >-
      always() &&
      needs.build-sdist.result == 'success' &&
      (needs.check-tag.result == 'skipped' || needs.check-tag.outputs.exists == 'false')
    needs:
      - build-sdist
      - check-tag
    strategy:
      matrix:
        include:
          - target: x86_64-linux-gnu
            os: ubuntu-24.04
            cuda_major: "13"
          - target: x86_64-windows
            os: windows-2025
            cuda_major: "13"
          - target: x86_64-linux-gnu
            os: ubuntu-24.04
            cuda_major: "12"
          - target: x86_64-windows
            os: windows-2025
            cuda_major: "12"
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      # -- CUDA 13 (Linux) ---------------------------------------------------
      # cuda-cudart-dev: cuda.h etc.; cuda-driver-dev: lib64/stubs/libcuda.so (the link
      # stub); cuda-nvrtc-dev: nvrtc.h. No runtime NVRTC package — that comes from PyPI.
      - name: Setup CUDA 13 (Linux)
        if: runner.os == 'Linux' && matrix.cuda_major == '13'
        run: |
          wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update
          sudo apt-get install -y \
            cuda-cudart-dev-13-3=13.3.29-1 \
            cuda-driver-dev-13-3=13.3.29-1 \
            cuda-nvrtc-dev-13-3=13.3.33-1
          if [ -f /usr/local/cuda-13.3/include/cuda.h ]; then
            echo "CUDA_PATH=/usr/local/cuda-13.3" >> $GITHUB_ENV
          else
            echo "CUDA_PATH=/usr/local/cuda" >> $GITHUB_ENV
          fi

      # -- CUDA 12 (Linux) ---------------------------------------------------
      - name: Setup CUDA 12 (Linux)
        if: runner.os == 'Linux' && matrix.cuda_major == '12'
        run: |
          wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update
          sudo apt-get install -y \
            cuda-cudart-dev-12-9 \
            cuda-driver-dev-12-9 \
            cuda-nvrtc-dev-12-9
          echo "CUDA_PATH=/usr/local/cuda-12.9" >> $GITHUB_ENV

      # -- CUDA 13 (Windows cache + install + export) ------------------------
      - name: Cache CUDA 13 (Windows)
        if: runner.os == 'Windows' && matrix.cuda_major == '13'
        id: cache-cuda-13
        uses: actions/cache@v5
        with:
          path: C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA
          # Toolkit 13.3.1 headers/stubs for the build. Full package set required (slim install exit 9).
          key: ${{ runner.os }}-cuda-13.3.1-nvcc-cudart-nvrtc-dev-crt-v1

      - name: Setup CUDA 13 (Windows)
        if: runner.os == 'Windows' && matrix.cuda_major == '13' && steps.cache-cuda-13.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          curl -fL -o cuda_installer.exe https://developer.download.nvidia.com/compute/cuda/13.3.1/network_installers/cuda_13.3.1_windows_network.exe
          if not exist cuda_installer.exe exit /b 1
          cuda_installer.exe -s nvcc_13.3 cudart_13.3 nvrtc_dev_13.3 crt_13.3 nvptxcompiler_13.3 nvvm_13.3
          if errorlevel 1 exit /b %ERRORLEVEL%
          if not exist "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.3\include\cuda.h" (
            echo cuda.h missing after install
            exit /b 1
          )

      - name: Export CUDA_PATH 13 (Windows)
        if: runner.os == 'Windows' && matrix.cuda_major == '13'
        shell: bash
        run: |
          cuda_root='C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.3'
          test -f "/c/Program Files/NVIDIA GPU Computing Toolkit/CUDA/v13.3/include/cuda.h"
          echo "CUDA_PATH=$cuda_root" >> "$GITHUB_ENV"

      # -- CUDA 12 (Windows cache + install + export) ------------------------
      - name: Configure CUDA 12 Path (Windows)
        if: runner.os == 'Windows' && matrix.cuda_major == '12'
        shell: pwsh
        run: |
          $cudaShort = "12.9"
          $cudaPath = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v$cudaShort"
          "CUDA_PATH=$cudaPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$cudaPath\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Cache CUDA 12 (Windows)
        if: runner.os == 'Windows' && matrix.cuda_major == '12'
        id: cache-cuda-12
        uses: actions/cache/restore@v5
        with:
          path: C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA
          key: ${{ runner.os }}-cuda-12.9.2-local-install-v1

      - name: Setup CUDA 12 (Windows)
        if: runner.os == 'Windows' && matrix.cuda_major == '12' && steps.cache-cuda-12.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $installerUrl = "https://developer.download.nvidia.com/compute/cuda/12.9.2/local_installers/cuda_12.9.2_576.57_windows.exe"
          Write-Host "Downloading CUDA 12.9.2 local installer from: $installerUrl"
          curl.exe -s -o cuda_installer.exe -L $installerUrl

          if (-not (Test-Path cuda_installer.exe) -or (Get-Item cuda_installer.exe).Length -lt 1MB) {
            Write-Error "Failed to download CUDA installer. The file is missing or too small."
            exit 1
          }

          $fileSizeMB = [math]::Round((Get-Item cuda_installer.exe).Length / 1MB, 1)
          Write-Host "Downloaded installer size: ${fileSizeMB} MB"

          # Local installer: full install with -s flag (component selection fails for local installer)
          Write-Host "Installing CUDA with args: -s"
          $proc = Start-Process ./cuda_installer.exe -ArgumentList "-s" -Wait -PassThru
          Write-Host "Installer exit code: $($proc.ExitCode)"

          # Verify
          $cudaPath = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.9"
          if (-not (Test-Path "$cudaPath\include\cuda.h")) {
            Write-Error "cuda.h missing after install at $cudaPath"
            exit 1
          }
          Write-Host "CUDA 12.9.2 installed successfully at: $cudaPath"

      - name: Cache CUDA 12 (Windows) — save
        if: runner.os == 'Windows' && matrix.cuda_major == '12' && steps.cache-cuda-12.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA
          key: ${{ runner.os }}-cuda-12.9.2-local-install-v1

      - name: Build wheel
        shell: bash
        env:
          ZTARGET: ${{ matrix.target }}
          CUDA_MAJOR: ${{ matrix.cuda_major }}
        run: |
          pip install build
          python -m build --wheel --outdir dist

      # No auditwheel repair: the wheel's only external CUDA library is libcuda.so.1 —
      # the DRIVER, which must come from the host and must never be vendored. NVRTC is
      # a separate pip dependency (nvidia-cuda-nvrtc / nvidia-cuda-nvrtc-cu12).
      # manylinux_2_17 is asserted by the build hook (glibc pinned via the zig target).
      - name: Collect wheel
        shell: bash
        run: |
          mkdir -p wheelhouse
          cp dist/*.whl wheelhouse/

      # GHA runners have no NVIDIA GPU/driver, so the smoke asserts the wheel installs,
      # the plugin autoloads, and filter creation fails with a clean VapourSynth error
      # (not a crash). Linux needs a libcuda.so.1 to satisfy the plugin's DT_NEEDED at
      # dlopen — point the loader at the toolkit's stub.
      - name: Smoke test (${{ matrix.target }}, CUDA ${{ matrix.cuda_major }})
        shell: bash
        run: |
          pip install VapourSynth numpy
          pip install wheelhouse/*.whl
          if [ "$RUNNER_OS" = "Linux" ]; then
            mkdir -p "$RUNNER_TEMP/cuda-stub"
            stub="${CUDA_PATH}/lib64/stubs/libcuda.so"
            test -f "$stub"
            cp "$stub" "$RUNNER_TEMP/cuda-stub/libcuda.so.1"
            export LD_LIBRARY_PATH="$RUNNER_TEMP/cuda-stub${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          fi
          python .github/smoke.py

      - uses: actions/upload-artifact@v7
        with:
          name: vapoursynth-vszipcu-${{ matrix.target }}-cu${{ matrix.cuda_major }}
          path: wheelhouse/*.whl

  # PyPI publish + GitHub release, only when this version has not been released yet. The release
  # creates the `${version}` tag at the pushed commit (softprops action-gh-release), which is what
  # check-tag looks for on the next push.
  release:
    if: needs.check-tag.outputs.exists == 'false'
    runs-on: ubuntu-latest
    needs:
      - check-tag
      - build-sdist
      - build-wheel
    permissions:
      id-token: write
      contents: write
    environment:
      name: pypi
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.build-sdist.outputs.version }}
          files: dist/*
          fail_on_unmatched_files: true

      - uses: pypa/gh-action-pypi-publish@release/v1
